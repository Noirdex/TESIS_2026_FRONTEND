name: software_agendamiento
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  font_awesome_flutter: ^10.8.0
  table_calendar: ^3.1.3
  lucide_icons_flutter: ^1.1.7
  
  # State Management & Providers
  provider: ^6.1.2
  
  # Network & Storage
  http: ^1.4.0
  shared_preferences: ^2.3.5
  cached_network_image: ^3.4.1
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  intl_utils: ^2.8.5

flutter:
  uses-material-design: true
  generate: true
